<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Argentique Events - Cloud Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --bleu-marine: #0a2342; --bleu-marine-clair: #173f6b; --blanc: #ffffff; --gris-fond: #f0f4f8; --gris-bordure: #d1d9e6; --rouge-alerte: #dc3545; --vert-ok: #28a745; --jaune-edit: #ffc107; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--gris-fond); padding: 0; margin: 0; color: #333; }
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bleu-marine); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 8px; color: #333; width: 300px; display: flex; flex-direction: column; gap: 10px; }
        nav { background-color: var(--bleu-marine); padding: 15px 20px; display: flex; gap: 15px; position: sticky; top: 0; z-index: 1000; align-items: center; }
        nav button { background: none; border: 2px solid var(--blanc); color: var(--blanc); font-size: 15px; cursor: pointer; padding: 6px 12px; border-radius: 4px; }
        nav button.actif { background: var(--blanc); color: var(--bleu-marine); font-weight: bold; }
        .nav-right { margin-left: auto; }
        .container { max-width: 1300px; margin: 20px auto; background: var(--blanc); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid var(--gris-bordure); }
        .dates-container { display: grid; grid-template-columns: 120px repeat(6, 1fr); gap: 10px; align-items: center; margin-bottom: 20px; background: #eef2ff; padding: 15px; border-radius: 6px; }
        input, select, textarea { padding: 8px; border: 1px solid var(--gris-bordure); border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 14px; }
        button { padding: 10px 15px; background: var(--bleu-marine); color: var(--blanc); border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: var(--rouge-alerte); }
        .btn-edit { background: var(--jaune-edit); color: #000; }
        .btn-mini { padding: 4px 8px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--gris-bordure); font-size: 13px; }
        .categorie-bloc { border: 1px solid var(--gris-bordure); border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
        .categorie-header { background: #edf2f7; padding: 10px; display: flex; justify-content: space-between; }
        .item-clickable { cursor: pointer; color: var(--bleu-marine); font-weight: bold; background: #eef2ff; padding: 2px 6px; border-radius: 4px; }
        #admin-login { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(10,35,66,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; color:white; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2>L'Argentique Events Cloud</h2>
    <div class="login-box">
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-password" placeholder="Mot de passe">
        <button onclick="handleLogin()">Se connecter</button>
        <p id="auth-error" style="color:red; font-size:12px; display:none;"></p>
    </div>
</div>

<nav id="main-nav" style="display:none;">
    <button id="nav-dossiers" class="actif" onclick="showTab('dossiers')">📁 Dossiers</button>
    <button id="nav-stock" onclick="showTab('stock')">📦 Stock & Tarifs</button>
    <button id="nav-clients" onclick="showTab('clients')">👥 Clients</button>
    <button id="nav-dispo" onclick="showTab('dispo')">📅 Disponibilités</button>
    <div class="nav-right">
        <button onclick="checkAdmin()">⚙️ Admin</button>
        <button onclick="handleLogout()" style="font-size:10px;">Déconnexion</button>
    </div>
</nav>

<datalist id="dl-stock"></datalist>
<datalist id="dl-clients"></datalist>

<!-- SECTIONS (STOCK, CLIENTS, DISPO, ADMIN, DOSSIERS) - Gardées identiques à ton code -->
<div id="tab-stock" class="container" style="display:none;">
    <h1>📦 Stock</h1>
    <div class="form-grid">
        <div><label>Réf</label><input type="text" id="s-ref"></div>
        <div><label>Nom</label><input type="text" id="s-nom"></div>
        <div><label>Qté</label><input type="number" id="s-qte"></div>
        <div><label>Achat</label><input type="number" id="s-pachat"></div>
        <div><label>Loc</label><input type="number" id="s-ploc"></div>
    </div>
    <button onclick="saveStock()">Enregistrer</button>
    <input type="text" id="search-stock" placeholder="Rechercher..." onkeyup="renderStock()" style="margin-top:20px;">
    <table><thead><tr><th>Réf</th><th>Nom</th><th>Qté</th><th>Achat</th><th>Loc</th><th>Actions</th></tr></thead><tbody id="table-stock-body"></tbody></table>
</div>

<div id="tab-clients" class="container" style="display:none;">
    <h1>👥 Clients</h1>
    <div class="form-grid">
        <div><label>Entreprise</label><input type="text" id="c-ent"></div>
        <div><label>Nom</label><input type="text" id="c-nom"></div>
        <div><label>Email</label><input type="text" id="c-mail"></div>
    </div>
    <button onclick="saveClient()">Enregistrer</button>
    <table style="margin-top:20px;"><thead><tr><th>Entreprise</th><th>Nom</th><th>Email</th><th>Actions</th></tr></thead><tbody id="table-clients-body"></tbody></table>
</div>

<div id="tab-dossiers" class="container" style="display:none;">
    <div id="view-list-dossiers">
        <div style="display:flex; justify-content:space-between;"><h1>📁 Dossiers</h1><button onclick="createDossier()">+ Nouveau</button></div>
        <input type="text" id="search-dossiers" placeholder="Rechercher..." onkeyup="renderDossierList()" style="margin:20px 0;">
        <table><thead><tr><th>Début</th><th>Projet</th><th>Client</th><th>Actions</th></tr></thead><tbody id="table-dossiers-body"></tbody></table>
    </div>
    <div id="view-detail-dossier" style="display:none;">
        <button class="btn-mini" onclick="showTab('dossiers')">⬅ Retour</button>
        <h1 id="det-titre">Détails</h1>
        <div class="form-grid">
            <div><label>Nom</label><input type="text" id="det-nom" onchange="syncDossier()"></div>
            <div><label>Client</label><input type="text" id="det-cli" list="dl-clients" onchange="syncDossier()"></div>
            <div><label>Coeff</label><input type="number" id="det-coeff" onchange="syncDossier()"></div>
        </div>
        <div id="dossier-cats-container"></div>
        <button onclick="addCat()">+ Catégorie</button>
        <div id="dossier-recap" style="margin-top:20px; font-weight:bold;"></div>
    </div>
</div>

<div id="tab-dispo" class="container" style="display:none;">
    <h1>📅 Disponibilités</h1>
    <div class="form-grid">
        <div><label>Matériel</label><input type="text" id="dispo-ref" list="dl-stock"></div>
        <div><label>Du</label><input type="date" id="dispo-d"></div>
        <div><label>Au</label><input type="date" id="dispo-f"></div>
    </div>
    <button onclick="checkDispo()">Vérifier</button>
    <div id="dispo-result"></div>
</div>

<script>
    const SB_URL = "https://mtryplxbgytozvruahwf.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10cnlwbHhiZ3l0b3p2cnVhaHdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDYwNjgsImV4cCI6MjA5MjI4MjA2OH0.08U3PnkeMn_kfiPNCv0RR0Qwvt9UBVZF4ecYasOc-2E";
    const client = supabase.createClient(SB_URL, SB_KEY);

    let stock = [], clients = [], dossiers = [], settings = {};
    let activeDossierId = null;

    async function handleLogin() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) { alert(error.message); } else { initApp(); }
    }

    function handleLogout() { client.auth.signOut(); location.reload(); }

    async function initApp() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { document.getElementById('auth-overlay').style.display = 'flex'; return; }
        
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';

        const [rS, rC, rD, rSt] = await Promise.all([
            client.from('stock').select('*'),
            client.from('clients').select('*'),
            client.from('dossiers').select('*'),
            client.from('settings').select('*').maybeSingle()
        ]);

        stock = rS.data || [];
        clients = rC.data || [];
        dossiers = rD.data || [];
        settings = rSt.data || {};

        showTab('dossiers');
        updateDatalists();
    }

    function showTab(t) {
        ['stock', 'clients', 'dossiers', 'dispo'].forEach(id => document.getElementById('tab-'+id).style.display = 'none');
        document.getElementById('tab-'+t).style.display = 'block';
        if(t === 'dossiers') { document.getElementById('view-detail-dossier').style.display = 'none'; document.getElementById('view-list-dossiers').style.display = 'block'; renderDossierList(); }
        if(t === 'stock') renderStock();
        if(t === 'clients') renderClients();
    }

    // --- LOGIQUE IDENTIQUE A TON CODE ORIGINAL (MAIS AVEC SYNC SUPABASE) ---

    async function saveStock() {
        const art = { ref: document.getElementById('s-ref').value.toUpperCase(), nom: document.getElementById('s-nom').value, qte: parseInt(document.getElementById('s-qte').value), pachat: parseFloat(document.getElementById('s-pachat').value), ploc: parseFloat(document.getElementById('s-ploc').value) };
        await client.from('stock').upsert(art);
        stock = stock.filter(x => x.ref !== art.ref); stock.push(art); renderStock(); updateDatalists();
    }

    function renderStock() {
        document.getElementById('table-stock-body').innerHTML = stock.map(s => `<tr><td>${s.ref}</td><td>${s.nom}</td><td>${s.qte}</td><td>${s.pachat}€</td><td>${s.ploc}€</td><td><button class="btn-mini btn-delete" onclick="deleteStock('${s.ref}')">X</button></td></tr>`).join('');
    }

    async function saveClient() {
        const cli = { id: Date.now(), ent: document.getElementById('c-ent').value, nom: document.getElementById('c-nom').value, email: document.getElementById('c-mail').value };
        await client.from('clients').insert(cli);
        clients.push(cli); renderClients(); updateDatalists();
    }

    function renderClients() {
        document.getElementById('table-clients-body').innerHTML = clients.map(c => `<tr><td>${c.ent}</td><td>${c.nom}</td><td>${c.email}</td><td><button class="btn-mini btn-delete" onclick="deleteClient(${c.id})">X</button></td></tr>`).join('');
    }

    function renderDossierList() {
        document.getElementById('table-dossiers-body').innerHTML = dossiers.map(d => `<tr><td>${d.immoD || '-'}</td><td>${d.nom}</td><td>${d.cli || '-'}</td><td><button class="btn-mini" onclick="openDossier(${d.id})">Ouvrir</button></td></tr>`).join('');
    }

    async function createDossier() {
        let n = prompt("Nom ?"); if(!n) return;
        let d = { id: Date.now(), nom: n, coeff: 1, cats: [{id: Date.now()+1, nom: "Matériel", items: []}] };
        await client.from('dossiers').insert(d);
        dossiers.push(d); openDossier(d.id);
    }

    function openDossier(id) {
        activeDossierId = id; let d = dossiers.find(x => x.id === id);
        document.getElementById('view-list-dossiers').style.display = 'none'; document.getElementById('view-detail-dossier').style.display = 'block';
        document.getElementById('det-nom').value = d.nom; document.getElementById('det-cli').value = d.cli || ''; document.getElementById('det-coeff').value = d.coeff || 1;
        renderCats();
    }

    async function syncDossier() {
        let d = dossiers.find(x => x.id === activeDossierId);
        d.nom = document.getElementById('det-nom').value; d.cli = document.getElementById('det-cli').value; d.coeff = parseFloat(document.getElementById('det-coeff').value);
        await client.from('dossiers').upsert(d); renderCats();
    }

    function renderCats() {
        let d = dossiers.find(x => x.id === activeDossierId);
        let cont = document.getElementById('dossier-cats-container'); cont.innerHTML = "";
        d.cats.forEach(cat => {
            let div = document.createElement('div'); div.className="categorie-bloc";
            div.innerHTML = `<div class="categorie-header"><b>${cat.nom}</b></div><div style="padding:10px;"><input type="text" id="add-ref-${cat.id}" list="dl-stock" placeholder="Réf"><button onclick="addItem(${cat.id})">Ajouter</button></div>`;
            cont.appendChild(div);
        });
    }

    function addItem(catId) {
        let r = document.getElementById('add-ref-'+catId).value.toUpperCase();
        dossiers.find(x => x.id === activeDossierId).cats.find(c => c.id === catId).items.push({ref:r, qte:1});
        syncDossier();
    }

    function updateDatalists() {
        document.getElementById('dl-stock').innerHTML = stock.map(s => `<option value="${s.ref}">${s.nom}</option>`).join('');
        document.getElementById('dl-clients').innerHTML = clients.map(c => `<option value="${c.ent || c.nom}">${c.ent || c.nom}</option>`).join('');
    }

    function checkDispo() {
        let ref = document.getElementById('dispo-ref').value.toUpperCase();
        let s = stock.find(x => x.ref === ref);
        document.getElementById('dispo-result').innerHTML = s ? `Stock total : ${s.qte}` : "Inconnu";
    }

    initApp();
</script>
</body>
</html>
