<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Argentique Events - Cloud Pro</title>
    <!-- Bibliothèques PDF & Supabase -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bleu-marine: #0a2342;
            --bleu-marine-clair: #173f6b;
            --blanc: #ffffff;
            --gris-fond: #f0f4f8;
            --gris-bordure: #d1d9e6;
            --rouge-alerte: #dc3545;
            --vert-ok: #28a745;
            --jaune-edit: #ffc107;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--gris-fond); padding: 0; margin: 0; color: #333; }

        /* Écran de login */
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bleu-marine); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 8px; color: #333; width: 300px; display: flex; flex-direction: column; gap: 10px; }

        nav { background-color: var(--bleu-marine); padding: 15px 20px; display: flex; gap: 15px; position: sticky; top: 0; z-index: 1000; align-items: center; }
        nav button { background: none; border: 2px solid var(--blanc); color: var(--blanc); font-size: 15px; cursor: pointer; padding: 6px 12px; border-radius: 4px; }
        nav button.actif { background: var(--blanc); color: var(--bleu-marine); font-weight: bold; }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; color: white; font-size: 12px; }

        .container { max-width: 1300px; margin: 20px auto; background: var(--blanc); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: var(--bleu-marine); margin-top: 0; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid var(--gris-bordure); }
        
        .notes-area { width: 100%; height: 100px; padding: 10px; border: 1px solid var(--gris-bordure); border-radius: 6px; font-family: inherit; margin-bottom: 20px; resize: vertical; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--gris-bordure); font-size: 13px; }
        th { background-color: #f1f1f1; }
        
        .loading-spinner { display: none; margin-left: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- ÉCRAN DE CONNEXION -->
<div id="auth-overlay">
    <h1 style="color: white; margin-bottom: 20px;">L'Argentique Events</h1>
    <div class="login-box">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="email@exemple.com">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="******">
        <button onclick="handleLogin()" id="btn-login">Se connecter</button>
        <p id="login-error" style="color:red; font-size:12px; display:none;"></p>
    </div>
</div>

<nav id="main-nav" style="display:none;">
    <button id="nav-dossiers" class="actif" onclick="showTab('dossiers')">📁 Dossiers</button>
    <button id="nav-stock" onclick="showTab('stock')">📦 Stock & Tarifs</button>
    <button id="nav-clients" onclick="showTab('clients')">👥 Clients</button>
    <button id="nav-dispo" onclick="showTab('dispo')">📅 Disponibilités</button>
    <div class="nav-right">
        <span id="user-display"></span>
        <button onclick="handleLogout()" style="border-color: #ff4d4d; color: #ff4d4d;">Déconnexion</button>
    </div>
</nav>

<div id="app-content" style="display:none;">
    <!-- ONGLET DOSSIERS -->
    <div id="tab-dossiers" class="container">
        <div id="view-list-dossiers">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h1>📁 Liste des Dossiers</h1>
                <button onclick="createDossier()">+ Nouveau Dossier</button>
            </div>
            <table>
                <thead><tr><th>Début</th><th>Projet</th><th>Client</th><th>Actions</th></tr></thead>
                <tbody id="table-dossiers-body"></tbody>
            </table>
        </div>

        <div id="view-detail-dossier" style="display:none;">
            <button class="btn-mini" onclick="showTab('dossiers')">⬅ Retour</button>
            <div style="display:flex; gap:10px; margin:15px 0;">
                <button onclick="genPDF('prep')">📋 Bon de Prépa</button>
                <button onclick="genPDF('devis')">📄 Devis</button>
                <button onclick="genPDF('facture')">💰 Facture</button>
            </div>
            
            <h2 id="det-titre">Détails Dossier</h2>
            <div class="form-grid">
                <div><label>Nom Projet</label><input type="text" id="det-nom" onchange="syncDossier()"></div>
                <div><label>Client</label><input type="text" id="det-cli" onchange="syncDossier()"></div>
                <div><label>Coeff. Durée</label><input type="number" step="0.1" id="det-coeff" onchange="syncDossier()"></div>
            </div>

            <label>Notes / Infos Libres (apparaissent sur les documents)</label>
            <textarea id="det-notes" class="notes-area" placeholder="Ex: Livraison porte A, code 1234..." onchange="syncDossier()"></textarea>

            <h3>📦 Matériel</h3>
            <div id="dossier-items-container"></div>
            <button onclick="addItemToDossier()">+ Ajouter Matériel</button>
        </div>
    </div>

    <!-- AUTRES ONGLETS (Simplifiés pour l'exemple, à compléter avec ton code précédent) -->
    <div id="tab-stock" class="container" style="display:none;"><h1>📦 Stock</h1><div id="stock-list"></div></div>
    <div id="tab-clients" class="container" style="display:none;"><h1>👥 Clients</h1></div>
    <div id="tab-dispo" class="container" style="display:none;"><h1>📅 Dispo</h1></div>
</div>

<script>
    // --- CONFIGURATION SUPABASE ---
    const SB_URL = "https://mtryplxbgytozvruahwf.supabase.co/rest/v1/";
    const SB_KEY = "sb_secret_6fNbNXjh-SORelrLp0B80w_r-k9c1ST";
    const supabase =导入 { createClient } = supabase;
    const client = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let localDossiers = [];
    let localStock = [];
    let activeDossierId = null;

    // --- AUTHENTIFICATION ---
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const btn = document.getElementById('btn-login');
        btn.disabled = true;

        const { data, error } = await client.auth.signInWithPassword({ email, password: pass });

        if (error) {
            document.getElementById('login-error').innerText = error.message;
            document.getElementById('login-error').style.display = 'block';
            btn.disabled = false;
        } else {
            currentUser = data.user;
            initApp();
        }
    }

    async function handleLogout() {
        await client.auth.signOut();
        location.reload();
    }

    // --- INITIALISATION ---
    async function initApp() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('user-display').innerText = currentUser.email;
        
        await loadData();
        showTab('dossiers');
    }

    async function loadData() {
        // Charger les dossiers depuis Supabase
        const { data: dossiers } = await client.from('dossiers').select('*');
        localDossiers = dossiers || [];
        
        const { data: stock } = await client.from('stock').select('*');
        localStock = stock || [];

        renderDossierList();
    }

    // --- NAVIGATION ---
    function showTab(t) {
        ['dossiers', 'stock', 'clients', 'dispo'].forEach(id => {
            document.getElementById('tab-'+id).style.display = 'none';
            document.getElementById('nav-'+id).classList.remove('actif');
        });
        document.getElementById('tab-'+t).style.display = 'block';
        document.getElementById('nav-'+t).classList.add('actif');
        if(t === 'dossiers') {
            document.getElementById('view-detail-dossier').style.display = 'none';
            document.getElementById('view-list-dossiers').style.display = 'block';
        }
    }

    // --- GESTION DOSSIERS ---
    function renderDossierList() {
        const body = document.getElementById('table-dossiers-body');
        body.innerHTML = localDossiers.map(d => `
            <tr>
                <td>-</td>
                <td><b>${d.nom}</b></td>
                <td>${d.cli || '-'}</td>
                <td><button onclick="openDossier(${d.id})">Ouvrir</button></td>
            </tr>
        `).join('');
    }

    async function createDossier() {
        const n = prompt("Nom du projet ?");
        if(!n) return;
        const newD = { nom: n, coeff: 1, cats: [], user_id: currentUser.id };
        const { data, error } = await client.from('dossiers').insert([newD]).select();
        if(!error) {
            localDossiers.push(data[0]);
            openDossier(data[0].id);
        }
    }

    function openDossier(id) {
        activeDossierId = id;
        const d = localDossiers.find(x => x.id === id);
        document.getElementById('view-list-dossiers').style.display = 'none';
        document.getElementById('view-detail-dossier').style.display = 'block';
        
        document.getElementById('det-nom').value = d.nom;
        document.getElementById('det-cli').value = d.cli || '';
        document.getElementById('det-coeff').value = d.coeff || 1;
        document.getElementById('det-notes').value = d.notes || '';
        // ... chargement des catégories et items ...
    }

    async function syncDossier() {
        const d = localDossiers.find(x => x.id === activeDossierId);
        d.nom = document.getElementById('det-nom').value;
        d.cli = document.getElementById('det-cli').value;
        d.coeff = parseFloat(document.getElementById('det-coeff').value);
        d.notes = document.getElementById('det-notes').value;

        // Sauvegarde immédiate dans Supabase
        await client.from('dossiers').update({ 
            nom: d.nom, 
            cli: d.cli, 
            coeff: d.coeff, 
            notes: d.notes 
        }).eq('id', activeDossierId);
    }

    // --- GÉNÉRATION PDF ADAPTATIVE ---
    async function genPDF(type) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const d = localDossiers.find(x => x.id === activeDossierId);
        
        // On récupère les infos de l'utilisateur connecté pour le devis
        // Dans une vraie table 'profiles', on aurait son tel et son nom complet
        const senderMail = currentUser.email; 

        doc.setFillColor(10, 35, 66); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(18);
        doc.text("L'Argentique Events", 15, 20);
        
        doc.setTextColor(0,0,0); doc.setFontSize(10);
        doc.text(`Document généré par : ${senderMail}`, 15, 50);
        doc.text(`Projet : ${d.nom}`, 15, 60);

        // Affichage des NOTES si remplies
        if(d.notes) {
            doc.setFont(undefined, 'italic');
            doc.text("Notes : " + d.notes, 15, 70, { maxWidth: 180 });
            doc.setFont(undefined, 'normal');
        }

        // ... Reste de la logique de tableau ...
        
        doc.save(`${type.toUpperCase()}_${d.nom}.pdf`);
    }

    // Vérifier si déjà connecté au chargement
    client.auth.getSession().then(({ data }) => {
        if (data.session) {
            currentUser = data.session.user;
            initApp();
        }
    });

</script>
</body>
</html>
